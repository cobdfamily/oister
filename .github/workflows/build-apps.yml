# Regenerate each app from scratch (approach D) and build both platforms.
#   Android  -> GitHub-hosted Linux (debug APK; signed release gated on secrets)
#   iOS      -> self-hosted Apple-silicon Mac runner (label: oister), signed
#              with the COBD distribution cert + ASC key that live ON the Mac
#              (nothing sensitive in GitHub Secrets — mirrors the PlayPalace
#              TestFlight workflow on the same box).
#
# Dispatch-triggered (and on app-v* tags) so it never fires unattended.
name: build-apps

on:
  workflow_dispatch:
    inputs:
      apps:
        description: "Comma-separated app dirs, or 'all'"
        default: "all"
  push:
    tags: ["app-v*"]

concurrency:
  group: build-apps-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------- Android
  android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [cobd.ca, blindhub.ca, bowencommunity.ca]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }   # Capacitor 8 -> JDK 21
      - uses: android-actions/setup-android@v3

      - name: Install + build workspace packages
        run: |
          npm install
          npm run build -w @cobdfamily/cobdcorekit -w @cobdfamily/cobd-apps-grid -w @cobdfamily/oister

      - name: Regenerate ${{ matrix.app }} (android)
        working-directory: packages/cobd-app-generator
        run: node bin/gen.mjs "${{ matrix.app }}" --platforms android

      - name: Assemble debug APK
        working-directory: packages/cobd-app-generator/.generated/${{ matrix.app }}/android
        run: ./gradlew assembleDebug --no-daemon --console=plain

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-debug-apk
          path: packages/cobd-app-generator/.generated/${{ matrix.app }}/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      # --- SCAFFOLD: signed release bundle (runs only once the keystore
      # secrets exist; harmless no-op until then) ---
      - name: Assemble signed release bundle
        if: ${{ env.ANDROID_KEYSTORE_B64 != '' }}
        working-directory: packages/cobd-app-generator/.generated/${{ matrix.app }}/android
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > /tmp/ks.jks
          ./gradlew bundleRelease --no-daemon --console=plain \
            -Pandroid.injected.signing.store.file=/tmp/ks.jks \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

  # -------------------------------------------------------------------- iOS
  ios:
    runs-on: [self-hosted, macos, oister]
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - { app: cobd.ca,           bundle: ca.cobd.apps.core }
          - { app: blindhub.ca,       bundle: ca.blindhub.apps.core }
          - { app: bowencommunity.ca, bundle: ca.bowencommunity.apps.core }
    steps:
      - uses: actions/checkout@v4
      - name: Xcode version
        run: xcodebuild -version

      - name: Install + build workspace packages
        run: |
          npm install
          npm run build -w @cobdfamily/cobdcorekit -w @cobdfamily/cobd-apps-grid -w @cobdfamily/oister

      - name: Regenerate ${{ matrix.app }} (ios)
        working-directory: packages/cobd-app-generator
        run: node bin/gen.mjs "${{ matrix.app }}" --platforms ios

      # Archive + export in ONE shell step so the login keychain stays unlocked
      # across xcodebuild archive and -exportArchive (it re-locks between
      # separate shell sessions and codesign then fails errSecInternalComponent).
      # Signing is automatic via the ASC API key (-allowProvisioningUpdates),
      # the only mechanism reachable from a launchd-spawned runner.
      - name: Archive + export (signed)
        working-directory: packages/cobd-app-generator
        run: |
          set -euo pipefail
          source ~/.config/cobd-deploy/secrets.env
          echo "::add-mask::${MAC_KEYCHAIN_PASSWORD}"
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"

          APP="${{ matrix.app }}"
          BUILD_NUMBER="$(date -u +%Y%m%d%H%M%S)"
          BUILD_DIR="${RUNNER_TEMP}/oister-${APP//\//-}"
          rm -rf "$BUILD_DIR"; mkdir -p "$BUILD_DIR"

          security unlock-keychain -p "$MAC_KEYCHAIN_PASSWORD" ~/Library/Keychains/login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$MAC_KEYCHAIN_PASSWORD" ~/Library/Keychains/login.keychain-db >/dev/null

          WS=".generated/${APP}/ios/App/App.xcworkspace"

          xcodebuild archive \
            -workspace "$WS" -scheme App -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$BUILD_DIR/App.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER"

          cat > "$BUILD_DIR/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${DEVELOPMENT_TEAM}</string>
            <key>signingStyle</key><string>automatic</string>
            <key>destination</key><string>export</string>
          </dict></plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$BUILD_DIR/App.xcarchive" \
            -exportOptionsPlist "$BUILD_DIR/ExportOptions.plist" \
            -exportPath "$BUILD_DIR/export" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

          ls -la "$BUILD_DIR/export"
          mkdir -p "$GITHUB_WORKSPACE/ipa-out"
          cp "$BUILD_DIR"/export/*.ipa "$GITHUB_WORKSPACE/ipa-out/${APP//\//-}.ipa"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-ipa
          path: ipa-out/*.ipa
          if-no-files-found: error

      # --- SCAFFOLD: TestFlight upload. Requires an App Store Connect *app
      # record* for the bundle id (the one thing -allowProvisioningUpdates
      # can't auto-create). Enable by setting repo variable UPLOAD_TESTFLIGHT=1
      # once the app records exist. ---
      - name: Upload to TestFlight
        if: ${{ vars.UPLOAD_TESTFLIGHT == '1' }}
        working-directory: packages/cobd-app-generator
        run: |
          set -euo pipefail
          source ~/.config/cobd-deploy/secrets.env
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          xcrun altool --upload-app -t ios \
            -f "$GITHUB_WORKSPACE/ipa-out/${{ matrix.app }}".ipa \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"
