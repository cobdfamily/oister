# TEMPLATE — copy to <repo>/.github/workflows/ when ready (kept here so it
# doesn't trigger heavy native builds before signing secrets exist).
#
# Regenerates each app from scratch (approach D) and builds both platforms.
# Android on Linux; iOS on the self-hosted M1 runner (infra/macos).

name: build-apps
on:
  workflow_dispatch:
  push:
    tags: ["app-v*"]

jobs:
  android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [cobd, blindhub, bowencommunity]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm install
      - name: Regenerate ${{ matrix.app }}
        working-directory: common/oister/packages/cobd-app-generator
        run: node bin/gen.mjs ${{ matrix.app }} --platforms android
      - name: Build signed bundle
        working-directory: common/oister/packages/cobd-app-generator/.generated/${{ matrix.app }}/android
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > /tmp/ks.jks
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=/tmp/ks.jks \
            -Pandroid.injected.signing.store.password="$ANDROID_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_KEY_PASSWORD"

  ios:
    runs-on: [self-hosted, macos, m1]
    strategy:
      matrix:
        app: [cobd, blindhub, bowencommunity]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm install
      - name: Regenerate ${{ matrix.app }}
        working-directory: common/oister/packages/cobd-app-generator
        run: node bin/gen.mjs ${{ matrix.app }} --platforms ios
      - name: Build + sign (fastlane match)
        working-directory: common/oister/packages/cobd-app-generator
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: fastlane ios release app:${{ matrix.app }}
