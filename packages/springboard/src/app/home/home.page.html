<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title role="heading" aria-level="1">Explore Bowen's Community</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content >
<ion-radio-group value="{{apps[0].url}}">
@for( app of apps; track app )
{
<ion-radio (click)="onAppLaunch(app.url)" value="{{app.url}}">
<ion-label>{{app.title}}</ion-label>
</ion-radio>
}
</ion-radio-group>
</ion-content>
